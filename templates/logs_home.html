{% extends "base.html" %}

{% block title %}系统记录{% endblock %}

{% block content %}
    <h1>系统记录</h1>
    <p>查看和管理系统的各类操作记录</p>
    
    <div class="stats-bar" style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
        <div class="stat-item" style="background: #e3f2fd; padding: 15px; border-radius: 8px; flex: 1; min-width: 150px;">
            <h4 style="margin: 0;">发药记录</h4>
            <p style="font-size: 24px; margin: 5px 0; font-weight: bold;">{{ stats.dispense_count }}</p>
        </div>
        <div class="stat-item" style="background: #e8f5e9; padding: 15px; border-radius: 8px; flex: 1; min-width: 150px;">
            <h4 style="margin: 0;">操作记录</h4>
            <p style="font-size: 24px; margin: 5px 0; font-weight: bold;">{{ stats.operation_count }}</p>
        </div>
    </div>
    
    <div class="dashboard-grid">
        <div class="dashboard-card">
            <h3>发药记录</h3>
            <p>查看自动分药机的发药历史记录</p>
            <a href="{{ URL_PREFIX }}{{ url_for('manage_dispense_logs') }}" class="btn btn-primary">查看记录</a>
        </div>
        
        <div class="dashboard-card">
            <h3>操作记录</h3>
            <p>查看Web管理后台的操作日志</p>
            <a href="{{ URL_PREFIX }}{{ url_for('manage_operation_logs') }}" class="btn btn-primary">查看记录</a>
        </div>
    </div>
    
    <div style="margin-top: 30px; background: #f5f5f5; border-radius: 8px; padding: 15px;">
        <h4 style="margin: 0 0 10px 0;">开发者信息</h4>
        <p style="margin: 0; font-size: 14px; color: #666;">
            详细的系统日志文件保存在服务器的 <code>data/ezdose.log</code> 目录下，便于问题排查。
        </p>
    </div>
{% endblock %}
