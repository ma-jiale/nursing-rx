{% extends "base.html" %}

{% block title %}{{ "编辑处方" if prescription else "新增处方" }}{% endblock %}

{% block content %}
<h1>{{ "编辑处方" if prescription else "新增处方" }}</h1>

<form method="POST" class="form">
    <div class="form-group">
        <label for="patient_id">患者:</label>
        <select id="patient_id" name="patient_id" required>
            <option value="">-- 请选择患者 --</option>
            {% for patient in patients %}
            <option value="{{ patient.id }}" {{ "selected" if prescription and prescription.patient_id==patient.id
                else "" }}>
                {{ patient.patient_name }} (床号: {{ patient.bed_number or '-' }})
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="medicine_name">药品名称:</label>
        <input type="text" id="medicine_name" name="medicine_name"
            value="{{ prescription.medicine_name if prescription else '' }}" required>
    </div>

    <div class="form-group">
        <label>剂量设置:</label>
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <div>
                <label for="morning_dosage">早餐:</label>
                <input type="number" id="morning_dosage" name="morning_dosage" step="1" min="0"
                    value="{{ prescription.morning_dosage if prescription else 0 }}" style="width: 80px;">
            </div>
            <div>
                <label for="noon_dosage">午餐:</label>
                <input type="number" id="noon_dosage" name="noon_dosage" step="1" min="0"
                    value="{{ prescription.noon_dosage if prescription else 0 }}" style="width: 80px;">
            </div>
            <div>
                <label for="evening_dosage">晚餐:</label>
                <input type="number" id="evening_dosage" name="evening_dosage" step="1" min="0"
                    value="{{ prescription.evening_dosage if prescription else 0 }}" style="width: 80px;">
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="meal_timing">用餐时机:</label>
        <select id="meal_timing" name="meal_timing">
            <option value="">-- 请选择 --</option>
            <option value="before_meal" {{ "selected" if prescription and prescription.meal_timing in
                ['before_meal', 'before' ] else "" }}>饭前</option>
            <option value="after_meal" {{ "selected" if prescription and prescription.meal_timing in
                ['after_meal', 'after' ] else "" }}>饭后</option>
            <option value="with_meal" {{ "selected" if prescription and prescription.meal_timing=='with_meal' else ""
                }}>随餐</option>
        </select>
    </div>

    <div class="form-group">
        <label for="start_date">开始日期:</label>
        <input type="date" id="start_date" name="start_date"
            value="{{ prescription.start_date if prescription else '' }}" required>
    </div>

    <div class="form-group">
        <label for="duration_days">持续天数:</label>
        <input type="number" id="duration_days" name="duration_days" min="1"
            value="{{ prescription.duration_days if prescription else 7 }}" required>
    </div>

    <!-- 隐藏药片面积字段，默认提交50 -->
    <input type="hidden" id="pill_size_area" name="pill_size_area" value="{{ prescription.pill_size_area if prescription and prescription.pill_size_area else 50 }}">

    <div class="form-group">
        <label style="display: inline-block;">
            <input type="checkbox" name="is_active" {{ "checked" if not prescription or prescription.is_active else ""
                }}>
            处方有效
        </label>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-success">{{ "更新" if prescription else "新增" }}</button>
        <a href="{{ URL_PREFIX }}{{ url_for('manage_prescriptions') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
